<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dev1.css">
    <title>Dev1 inf3500</title>
</head>
<body>
    <main class="container">
    <section class="Formulaire">
    <h1>Ready to start your succes story</h1>
    <p>Signup to our website and start leafing through your favorite literature today!</p>
    <form>
        <div class="input-group">
            <label for="name">Full name</label>
            <input type="text" id="name" name="name" placeholder="Jane Doe" required>     
        </div>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="janedoe@gmail.com" required>
        </div>
        <div class="input-group">
            <label for="Area of interest">Area of interest</label>
            <select id="Area of interest" name="Area of interest">
                <option value="fiction">Fiction</option>
                <option value="non-fiction">Non-Fiction</option>
                <option value="science">Science</option>
                <option value="history">History</option>
            </select>
        </div>
        <div class="checkbox-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the <a href="#">terms and conditions</a></label>
        </div>
        <button type="submit">Sign Up</button>
    </form>
    </section>
    <section class="Image">
        <img src="test.png" alt="Book Image">
    </section>
    </main>
</body>
</html>
